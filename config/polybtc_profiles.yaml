version: 1
name: polybtc_impulse_momentum_profiles
market: polymarket_btc_updown_5m

strategy_reference:
  style: momentum_follow_through_into_close
  entry_window_seconds_left_target: 120
  entry_window_seconds_left_tolerance: 30
  btc_move_usd_min: 70
  btc_move_usd_max_reference: 100
  skew_bias_note: "Prefer direction supported by market skew when momentum is already established."
  sizing_note: "Typical discretionary sizing can be up to ~50% of allocated trading balance; tune risk per user preference."
  optional_hedge_note: "When skew is extreme (for example >=95/5), allow a small opposite hedge to reduce last-second reversal risk."

shared_rules:
  market_validation:
    require_active: true
    require_not_closed: true
    require_end_in_future_sec_min: 5
    candidate_slots: ["prev", "current", "next", "next2"]
    choose: "closest_valid"
  heartbeat:
    enabled: true
    max_stale_sec: 15
    check_interval_sec: 5
    fail_action: "skip"
  execution_safety:
    skip_if_quote_stale_sec_gt: 8
    skip_if_dns_or_api_errors_consecutive: 3
    skip_if_spread_gt: 0.03
    skip_if_top_ask_notional_usd_lt: 30
  session_timing:
    monitor_continuous: true
    min_entry_seconds_left: 60
    exit_before_sec: 20

profiles:
  conservative:
    description: "More stable mode: stricter filters and lower per-trade risk."
    signal:
      trigger_source: "clob_best_ask"
      direction_rule: "follow_stronger_side_over_threshold"
      threshold_price: 0.70
      # Align side with BTC impulse (blocks UP-after-dump / DOWN-after-pump).
      require_move_aligned: true
      # Cap blow-off candles that reverse more often near expiry.
      btc_move_usd_max: 200
      # Crowd must lean with the trade (chosen_ask - opposite_ask).
      min_skew_gap: 0.18
      # Anti-spike: same-side GO must hold across consecutive polls.
      confirm_polls: 2
      # 1m candle must agree with side (anti-wick entry).
      require_1m_aligned: true
    sizing:
      stake_mode: "edge_scaled"
      stake_usd: 5
      risk_per_trade_pct_equity: 8
      max_notional_usd: 8
      edge_scale:
        enabled: true
        min_scale: 0.50
        max_scale: 1.25
        edge_for_min_scale: 0.02
        edge_for_full_scale: 0.06
      # Soft size-down after consecutive losses (before hard kill switch).
      loss_streak_scale:
        enabled: true
        after_losses: 1
        scale_per_loss: 0.5
        min_scale: 0.25
      daily_max_loss_pct: 10
      max_trades_per_day: 12
    risk_controls:
      max_consecutive_losses: 3
      min_edge: 0.02
      # Hard EV gate using heuristic win-prob (see polybtc_preflight.estimate_win_prob).
      require_ev_gate: true
    session_filter:
      enabled: true
      require_hour: false
      # Thin / noisy UTC overnight hours — tune with analytics per your timezone.
      block_hours_utc: [0, 1, 2, 3, 4]
    hedge:
      enabled: true
      trigger_side_price_gte: 0.95
      trigger_seconds_left_lte: 45
      hedge_share_of_main_pct: 3
      hedge_notional_usd_min: 1
      hedge_notional_usd_max: 2
    stop_loss:
      enabled: true
      stop_loss_pct_from_entry: 0.25
    exit_policy:
      enabled: true
      hold_to_resolve:
        enabled: true
        min_bid: 0.95
        max_seconds_left: 45
        exit_before_sec: 3
      early_cut:
        enabled: true
        max_seconds_left: 40
        min_adverse_from_entry: 0.03
        on_btc_reverse: true

  aggressive:
    description: "Higher frequency and higher risk mode."
    signal:
      trigger_source: "clob_best_ask"
      direction_rule: "follow_stronger_side_over_threshold"
      threshold_price: 0.70
      require_move_aligned: true
      btc_move_usd_max: 250
      min_skew_gap: 0.12
      confirm_polls: 1
      require_1m_aligned: true
    sizing:
      stake_mode: "edge_scaled"
      stake_usd: 5
      risk_per_trade_pct_equity: 15
      max_notional_usd: 15
      edge_scale:
        enabled: true
        min_scale: 0.60
        max_scale: 1.50
        edge_for_min_scale: 0.01
        edge_for_full_scale: 0.05
      loss_streak_scale:
        enabled: true
        after_losses: 1
        scale_per_loss: 0.6
        min_scale: 0.30
      daily_max_loss_pct: 15
      max_trades_per_day: 20
    risk_controls:
      max_consecutive_losses: 5
      min_edge: 0.01
      require_ev_gate: true
    session_filter:
      enabled: false
      require_hour: false
      block_hours_utc: []
    hedge:
      enabled: true
      trigger_side_price_gte: 0.93
      trigger_seconds_left_lte: 50
      hedge_share_of_main_pct: 5
      hedge_notional_usd_min: 1
      hedge_notional_usd_max: 3
    stop_loss:
      enabled: true
      stop_loss_pct_from_entry: 0.30
    exit_policy:
      enabled: true
      hold_to_resolve:
        enabled: true
        min_bid: 0.93
        max_seconds_left: 50
        exit_before_sec: 3
      early_cut:
        enabled: true
        max_seconds_left: 45
        min_adverse_from_entry: 0.04
        on_btc_reverse: true

  # Selective mode: fewer trades, higher market-implied confidence band.
  # NOTE: win-rate ≠ profit. Entry ~0.85 needs true WR > 85% just to break even.
  # Cap max_entry_price so we do not buy 0.97 for pennies of payout.
  high_confidence:
    description: "Selective: stronger impulse, aligned direction, mid-high threshold, avoid ultra-rich prices."
    signal:
      trigger_source: "clob_best_ask"
      direction_rule: "follow_stronger_side_over_threshold"
      threshold_price: 0.82
      max_entry_price: 0.92
      require_move_aligned: true
      require_entry_window: true
      btc_move_usd_min: 95
      btc_move_usd_max: 160
      min_skew_gap: 0.30
      confirm_polls: 3
      require_1m_aligned: true
    sizing:
      stake_mode: "edge_scaled"
      stake_usd: 4
      risk_per_trade_pct_equity: 5
      max_notional_usd: 6
      edge_scale:
        enabled: true
        min_scale: 0.50
        max_scale: 1.20
        edge_for_min_scale: 0.03
        edge_for_full_scale: 0.07
      loss_streak_scale:
        enabled: true
        after_losses: 1
        scale_per_loss: 0.5
        min_scale: 0.25
      daily_max_loss_pct: 8
      max_trades_per_day: 6
    risk_controls:
      max_consecutive_losses: 2
      min_edge: 0.03
      require_ev_gate: true
    session_filter:
      enabled: true
      require_hour: false
      # More selective: avoid thin overnight + optional allow-list can be set later.
      block_hours_utc: [0, 1, 2, 3, 4, 5]
    hedge:
      enabled: true
      trigger_side_price_gte: 0.95
      trigger_seconds_left_lte: 40
      hedge_share_of_main_pct: 3
      hedge_notional_usd_min: 1
      hedge_notional_usd_max: 2
    stop_loss:
      enabled: true
      stop_loss_pct_from_entry: 0.20
    exit_policy:
      enabled: true
      hold_to_resolve:
        enabled: true
        min_bid: 0.95
        max_seconds_left: 40
        exit_before_sec: 2
      early_cut:
        enabled: true
        max_seconds_left: 35
        min_adverse_from_entry: 0.025
        on_btc_reverse: true

  # Observe-only research profile: looser gates to collect more GO candidates in logs.
  # NOT for live money — use with polybtc_live_logger / dry-run only.
  observe:
    description: "Research logger profile: looser impulse/skew/edge so more candidates appear in logs."
    signal:
      trigger_source: "clob_best_ask"
      direction_rule: "follow_stronger_side_over_threshold"
      threshold_price: 0.60
      max_entry_price: 0.95
      require_move_aligned: true
      require_entry_window: false
      btc_move_usd_min: 40
      btc_move_usd_max: 300
      min_skew_gap: 0.08
      confirm_polls: 1
      require_1m_aligned: false
    sizing:
      stake_mode: "fixed_or_cap"
      stake_usd: 1
      risk_per_trade_pct_equity: 2
      max_notional_usd: 2
      daily_max_loss_pct: 5
      max_trades_per_day: 50
      loss_streak_scale:
        enabled: false
    risk_controls:
      max_consecutive_losses: 10
      min_edge: 0.0
      require_ev_gate: false
    session_filter:
      enabled: false
      require_hour: false
      block_hours_utc: []
    hedge:
      enabled: false
    stop_loss:
      enabled: true
      stop_loss_pct_from_entry: 0.30
    exit_policy:
      enabled: true
      hold_to_resolve:
        enabled: true
        min_bid: 0.95
        max_seconds_left: 45
        exit_before_sec: 3
      early_cut:
        enabled: true
        max_seconds_left: 40
        min_adverse_from_entry: 0.03
        on_btc_reverse: false

runner_mapping:
  script: "skills/polybtc-momentum/scripts/test_polybtc_session_exit_sl.py"
  direct_flags_now_supported:
    - "--threshold"
    - "--stake-usd"
    - "--stop-loss-pct"
    - "--exit-before-sec"
    - "--min-entry-seconds-left"
    - "--entry-timeout-min"
    - "--poll-sec"
    - "--execute"
  example_conservative_now: ".venv/bin/python scripts/test_polybtc_session_exit_sl.py --threshold 0.70 --stake-usd 4 --stop-loss-pct 0.25 --exit-before-sec 20 --min-entry-seconds-left 60 --entry-timeout-min 60 --poll-sec 5 --execute"
  example_aggressive_now: ".venv/bin/python scripts/test_polybtc_session_exit_sl.py --threshold 0.70 --stake-usd 6 --stop-loss-pct 0.30 --exit-before-sec 20 --min-entry-seconds-left 60 --entry-timeout-min 60 --poll-sec 5 --execute"

notes:
  - "Current 5m runner uses threshold/side-strength logic with optional move alignment."
  - "Entry behavior: continuous CLOB ask monitoring; if UP/DOWN >= threshold, enter on stronger side."
  - "require_move_aligned: only enter UP when btc_move>0 and DOWN when btc_move<0 (signed move)."
  - "btc_move_usd_max: skip blow-off candles above this absolute USD move."
  - "min_skew_gap: chosen_ask - opposite_ask must clear this (market skew confirmation)."
  - "confirm_polls: same-side GO must hold across N consecutive polls before entry."
  - "require_ev_gate: block when heuristic edge (est_win_prob - entry) < min_edge."
  - "session_filter: optional UTC hour allow/block list to skip weak sessions."
  - "exit_policy: hold-to-resolve near 0.95, early-cut if underwater/BTC reverse near expiry."
  - "require_1m_aligned: last 1m BTC candle must agree with side (anti-wick entry)."
  - "stake_mode edge_scaled: stake grows with heuristic edge between min_scale and max_scale."
  - "loss_streak_scale: soft size-down after consecutive losses before kill switch."
  - "observe profile: looser research gates for live_logger / dry-run only — not live money."
  - "high_confidence aims for quality over frequency — not a guaranteed 90% win rate."
  - "Buying at price p requires true win-rate > p for positive EV (e.g. 0.90 entry needs >90%)."
